        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d0d12;
            --bg-card: #1a1a2e;
            --accent: #4a3f8a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border: #2a2a3e;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-date {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .btn-update {
            background-color: var(--accent);
            color: var(--text-primary);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .btn-update:hover {
            background-color: #5a4fa0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 63, 138, 0.4);
        }

        .btn-update:active {
            transform: translateY(0);
        }

        .tabs-container {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tabs {
            display: flex;
            gap: 0;
            padding: 0 1.5rem;
            min-width: min-content;
        }

        .tab {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 1rem 1.5rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.5rem;
            height: 1.5rem;
            background-color: var(--danger);
            color: var(--text-primary);
            border-radius: 50%;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .subtabs-container {
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .subtabs {
            display: flex;
            gap: 0;
            padding: 0 1.5rem;
            min-width: min-content;
        }

        .subtab {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            font-size: 0.85rem;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .subtab:hover {
            color: var(--text-primary);
        }

        .subtab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1.5rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            max-width: 100%;
        }

        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 24px rgba(74, 63, 138, 0.2);
            transform: translateY(-4px);
        }

        .card-header {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .card-sender {
            font-weight: 600;
            font-size: 1rem;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .card-channel {
            background-color: rgba(74, 63, 138, 0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 0.35rem;
            font-size: 0.8rem;
            max-width: fit-content;
        }

        .card-date {
            font-size: 0.8rem;
        }

        .card-summary {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-primary);
            word-break: break-word;
        }

        .card-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn-small {
            flex: 1;
            min-width: 100px;
            padding: 0.6rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.4rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: none;
            color: var(--text-secondary);
        }

        .btn-small:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-small.done {
            background-color: rgba(16, 185, 129, 0.2);
            border-color: var(--success);
            color: var(--success);
        }

        .btn-small.done:hover {
            background-color: rgba(16, 185, 129, 0.3);
        }

        .btn-small.progress {
            background-color: rgba(245, 158, 11, 0.2);
            border-color: var(--warning);
            color: var(--warning);
        }

        .btn-small.progress:hover {
            background-color: rgba(245, 158, 11, 0.3);
        }

        .btn-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.6rem 1rem;
            border: 1px solid var(--accent);
            border-radius: 0.4rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-link:hover {
            background-color: rgba(74, 63, 138, 0.2);
        }

        .og-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 0.4rem 0;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: underline;
            margin-top: 0.5rem;
        }

        .og-toggle:hover {
            color: var(--accent);
        }

        .og-content {
            display: none;
            background-color: rgba(74, 63, 138, 0.1);
            border-left: 3px solid var(--accent);
            padding: 1rem;
            border-radius: 0.4rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        .og-content.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        footer {
            background-color: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        @media (max-width: 640px) {
            header {
                padding: 1rem;
            }

            .header-title {
                font-size: 1.25rem;
            }

            .content {
                padding: 1rem;
            }

            .tabs {
                padding: 0 1rem;
            }

            .subtabs {
                padding: 0 1rem;
            }

            .card {
                padding: 1rem;
            }
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

        function getSlackLink(message) {
            if (message.channelId.startsWith('D')) {
                return `https://jobkorea.enterprise.slack.com/archives/${message.channelId}`;
            } else {
                const ts = message.ts.replace(/(\d{10})(\d{3})/, '$1.$2');
                return `https://jobkorea-linker.slack.com/archives/${message.channelId}/p${message.ts}`;
            }
        }

        function filterMessages() {
            let filtered = messages.filter(m => m.category === currentCategory);

            if (currentSubtype !== '전체') {
                filtered = filtered.filter(m => m.subtype === currentSubtype);
            }

            return filtered;
        }

        function updateBadges() {
            const categories = ['제품', '운영', '영업', '데이터요청', '기타'];
            categories.forEach(cat => {
                const count = messages.filter(m => m.category === cat).length;
                document.getElementById(`badge-${cat}`).textContent = count;
            });
        }

        function renderCards() {
            const filtered = filterMessages();
            const container = document.getElementById('cardsContainer');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">📭</div>
                        <h3>메시지가 없습니다</h3>
                        <p>선택한 필터에 해당하는 메시지가 없습니다.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(msg => `
                <div class="card" data-id="${msg.id}">
                    <div class="card-header">
                        <div class="card-sender">${msg.sender}</div>
                        <div class="card-meta">
                            <div class="card-channel">${msg.channel}</div>
                            <div class="card-date">${msg.date}</div>
                        </div>
                    </div>
                    <div class="card-summary">${msg.summary}</div>
                    <button class="og-toggle" onclick="toggleOriginal(${msg.id}, this)">원문 보기</button>
                    <div class="og-content" id="og-${msg.id}">${msg.fullText}</div>
                    <div class="card-actions">
                        <a href="${getSlackLink(msg)}" target="_blank" class="btn-link">Slack 열기</a>
                        <button class="btn-small ${doneItems[msg.id] ? 'done' : ''}" onclick="toggleDone(${msg.id}, this)">✓ 완료</button>
                        <button class="btn-small ${progressItems[msg.id] ? 'progress' : ''}" onclick="toggleProgress(${msg.id}, this)">⟳ 처리중</button>
                    </div>
                </div>
            `).join('');
        }

        function switchCategory(btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.category;
            currentSubtype = '전체';
            document.querySelectorAll('.subtab').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-subtype="전체"]').classList.add('active');
            renderCards();
        }

        function switchSubtab(btn) {
            document.querySelectorAll('.subtab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentSubtype = btn.dataset.subtype;
            renderCards();
        }

        function toggleOriginal(id, btn) {
            const content = document.getElementById(`og-${id}`);
            content.classList.toggle('show');
            btn.textContent = content.classList.contains('show') ? '원문 숨기기' : '원문 보기';
        }

        function toggleDone(id, btn) {
            if (doneItems[id]) {
                delete doneItems[id];
                btn.classList.remove('done');
            } else {
                doneItems[id] = true;
                if (progressItems[id]) delete progressItems[id];
                btn.classList.add('done');
                document.querySelector(`[onclick="toggleProgress(${id}, this)"]`)?.classList.remove('progress');
            }
            localStorage.setItem('doneItems', JSON.stringify(doneItems));
        }

        function toggleProgress(id, btn) {
            if (progressItems[id]) {
                delete progressItems[id];
                btn.classList.remove('progress');
            } else {
                progressItems[id] = true;
                if (doneItems[id]) delete doneItems[id];
                btn.classList.add('progress');
                document.querySelector(`[onclick="toggleDone(${id}, this)"]`)?.classList.remove('done');

            localStorage.setItem('progressItems', JSON.stringify(progressItems));
